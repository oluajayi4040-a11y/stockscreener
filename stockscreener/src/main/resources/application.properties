# =========================================
# APPLICATION
# =========================================
spring.application.name=stockscreener

# Disable DevTools hot reload (prevents stale classes)
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false


# =========================================
# DATABASE (MySQL)
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/stockscreener?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Pelumi9090@#!

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =========================================
# ALPACA API (LIVE MARKET DATA)
# =========================================
alpaca.api.key=${ALPACA_API_KEY}
alpaca.api.secret=${ALPACA_API_SECRET}
alpaca.base.url=https://data.alpaca.markets


# =========================================
# EMAIL (GMAIL SMTP)
# =========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tvworks247@gmail.com
spring.mail.password=Pelumi90@
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# =========================================
# WEBSOCKET / STOMP
# =========================================
spring.websocket.path=/ws
spring.websocket.allowed-origins=*
spring.websocket.sockjs.enabled=true


# =========================================
# LOGGING
# =========================================
logging.level.org.springframework.web=INFO
logging.level.stockscreener=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
